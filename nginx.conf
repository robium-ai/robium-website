# Canonical host serves the site; alternate domains 301 to it.
# default_server keeps the *.run.app URL (and health checks) serving content.
server {
    listen 8080 default_server;
    root /usr/share/nginx/html;
    index index.html;

    # Behind Cloud Run's proxy: directory redirects must stay relative,
    # or nginx leaks its internal port/scheme into Location
    # (http://host:8080/... — unreachable from browsers).
    absolute_redirect off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /_astro/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
    location /viewer/ { add_header Cache-Control "public, max-age=3600"; try_files $uri $uri/ /viewer/index.html; }
    location /media/  { add_header Cache-Control "public, max-age=86400"; }
    location /logos/  { add_header Cache-Control "public, max-age=86400"; }

    location / { try_files $uri $uri/ /index.html; }
}

server {
    listen 8080;
    server_name www.robium.org robium.ai www.robium.ai robium.dev www.robium.dev;
    return 301 https://robium.org$request_uri;
}
